<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>💖 Convite Especial 💖</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: linear-gradient(
          135deg,
          #ff6fa5 0%,
          #ff4d88 35%,
          #ff7eb3 70%,
          #ffb6d9 100%
        );
      }

      .tela {
        width: 100vw;
        height: 100vh;
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        position: absolute;
        inset: 0;

        background: linear-gradient(
          135deg,
          #ff6fa5 0%,
          #ff4d88 35%,
          #ff7eb3 70%,
          #ffb6d9 100%
        );
      }

      .ativa {
        display: flex;
      }

      .card {
        background: rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(15px);
        padding: 40px;
        border-radius: 30px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        max-width: 700px;
        width: 90%;
      }

      h1 {
        color: white;
        font-size: 3rem;
        margin-bottom: 20px;
        text-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
      }

      p {
        color: white;
        font-size: 1.2rem;
        margin-bottom: 25px;
      }

      .botoes {
        position: relative;
        width: 100%;
        max-width: 500px;
        height: 220px;
        margin: auto;
      }

      button {
        border: none;
        border-radius: 50px;
        padding: 18px 40px;
        font-size: 1.2rem;
        cursor: pointer;
        transition: 0.3s;
      }

      .sim {
        background: #ff3d7f;
        color: white;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
      }

      .sim:hover {
        transform: scale(1.1);
      }

      .nao {
        background: white;
        color: #ff3d7f;
        position: absolute;
      }

      .mensagem {
        color: white;
        margin-top: 15px;
        font-size: 1.1rem;
        min-height: 30px;
      }

      .final {
        font-size: 1.4rem;
        line-height: 1.8;
      }

      .flores {
        font-size: 4rem;
        margin-bottom: 20px;
      }

      .particula {
        position: absolute;
        pointer-events: none;
        animation: cair linear forwards;
      }

      @keyframes cair {
        from {
          transform: translateY(-100px) rotate(0deg);
          opacity: 1;
        }
        to {
          transform: translateY(120vh) rotate(360deg);
          opacity: 0;
        }
      }

      .confete {
        position: absolute;
        width: 10px;
        height: 10px;
        animation: confete 4s linear forwards;
      }

      @keyframes confete {
        from {
          transform: translateY(-50px) rotate(0deg);
          opacity: 1;
        }
        to {
          transform: translateY(110vh) rotate(720deg);
          opacity: 0;
        }
      }

      @media (max-width: 768px) {
        .card {
          width: 95%;
          padding: 25px;
        }

        h1 {
          font-size: 2rem;
        }

        p,
        .final {
          font-size: 1rem;
        }

        button {
          padding: 14px 25px;
          font-size: 1rem;
        }

        .flores {
          font-size: 3rem;
        }

        .botoes {
          height: 260px;
        }
      }
    </style>
  </head>
  <body>
    <!-- TELA 1 -->

    <div class="tela ativa" id="tela1">
      <div class="card">
        <h1>💖 Aceita sair comigo? 💖</h1>

        <div class="botoes">
          <button class="sim" onclick="abrirTela2()">Sim ❤️</button>

          <button class="nao" id="nao1">Não 😅</button>
        </div>

        <div class="mensagem" id="frase1"></div>
      </div>
    </div>

    <!-- TELA 2 -->

    <div class="tela" id="tela2">
      <div class="card">
        <h1>🥺 Tem certeza mesmo?</h1>

        <p>Essa é sua decisão final...</p>

        <div class="botoes">
          <button class="sim" id="simGrande" onclick="aceitou()">
            Sim, tenho certeza ❤️
          </button>

          <button class="nao" id="nao2">Não 🤔</button>
        </div>

        <div class="mensagem" id="frase2"></div>
      </div>
    </div>

    <!-- TELA 3 -->

    <div class="tela" id="tela3">
      <div class="card">
        <div class="flores">🌹🌷💐🌸🌺</div>

        <h1>Tudo bem, gatinha ❤️</h1>

        <div class="final">
          Você acabou de aceitar sair comigo oficialmente 🥰
          <br /><br />
          Prometo:
          <br />
          ✨ boas conversas
          <br />
          ✨ muitas risadas
          <br />
          ✨ momentos especiais
          <br /><br />
          Mal posso esperar pelo nosso encontro 💖
        </div>
      </div>
    </div>

    <script>
      const frases = [
        "🥺 Pensa melhor...",
        "😭 Não faz isso comigo...",
        "😳 Tem certeza?",
        "🤭 Esse botão não funciona...",
        "😅 Você é rápida hein...",
        "❤️ O outro botão é mais bonito...",
        "🥹 Dá uma chance...",
        "😎 Tenta clicar no SIM...",
      ];

      function mostrarFrase(id) {
        document.getElementById(id).innerHTML =
          frases[Math.floor(Math.random() * frases.length)];
      }

      function fugir(botao) {
        const largura = Math.min(
          window.innerWidth - 150,
          document.querySelector(".botoes").offsetWidth - 120,
        );

        const altura = document.querySelector(".botoes").offsetHeight - 80;

        botao.style.left = Math.random() * largura + "px";

        botao.style.top = Math.random() * altura + "px";
      }

      const nao1 = document.getElementById("nao1");

      const nao2 = document.getElementById("nao2");

      ["mouseover", "touchstart", "pointerenter"].forEach((evento) => {
        nao1.addEventListener(evento, () => {
          fugir(nao1);
          mostrarFrase("frase1");
        });

        nao2.addEventListener(evento, () => {
          fugir(nao2);
          mostrarFrase("frase2");

          let sim = document.getElementById("simGrande");

          let tamanho = parseFloat(sim.dataset.size || 1);

          tamanho += 0.15;

          sim.dataset.size = tamanho;

          sim.style.transform = `scale(${tamanho})`;
        });
      });

      function abrirTela2() {
        document.getElementById("tela1").classList.remove("ativa");

        document.getElementById("tela2").classList.add("ativa");
      }

      function aceitou() {
        document.getElementById("tela2").classList.remove("ativa");

        document.getElementById("tela3").classList.add("ativa");

        criarConfetes();
      }

      function criarConfetes() {
        for (let i = 0; i < 150; i++) {
          let c = document.createElement("div");

          c.classList.add("confete");

          c.style.left = Math.random() * 100 + "vw";

          c.style.top = "-20px";

          c.style.background = ["#ff3d7f", "#ffb6c1", "#ffffff", "#ff69b4"][
            Math.floor(Math.random() * 4)
          ];

          c.style.animationDuration = Math.random() * 3 + 2 + "s";

          document.body.appendChild(c);

          setTimeout(() => {
            c.remove();
          }, 5000);
        }
      }

      function criarParticula() {
        const p = document.createElement("div");

        p.classList.add("particula");

        p.innerHTML = Math.random() > 0.5 ? "❤️" : "🌸";

        p.style.left = Math.random() * 100 + "vw";

        p.style.fontSize = Math.random() * 20 + 20 + "px";

        p.style.animationDuration = Math.random() * 4 + 4 + "s";

        document.body.appendChild(p);

        setTimeout(() => {
          p.remove();
        }, 8000);
      }

      setInterval(criarParticula, 300);
    </script>
  </body>
</html>
